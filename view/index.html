<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <header class="bg-white py-6 border-b border-gray-200">
        <h1 class="text-4xl font-extrabold text-center text-indigo-600 tracking-tight uppercase">
            Página de Inglés
        </h1>
    </header>

    <nav class="bg-indigo-700 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-center space-x-6 py-3">
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Principal</a>
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Info</a>
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Preguntas</a>
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Futuro</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">

            <div id="contener-play"
                class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 flex flex-col items-center text-center">

                <div class="bg-indigo-100 p-4 rounded-full mb-4">
                    <span class="text-4xl">🎮</span>
                </div>

                <h2 class="text-2xl font-bold text-gray-800 mb-2">Adivina la palabra</h2>
                <p id="areaText" class="text-3xl mb-6 text-center font-semibold text-indigo-900 italic">¿Empezamos?</p>

                <div id="areaEnser"
                    class="hidden w-full space-y-2 mb-6 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                    <p id="translation" class="text-2xl font-bold text-indigo-600"></p>
                    <p id="pronunciation" class="text-lg text-gray-500 italic"></p>
                </div>

                <div id="contenerButtonPlay" class="flex flex-col items-center justify-center w-full max-w-sm mx-auto">

                    <button id="btnBegin"
                        class="text-sm w-full bg-[#1e293b] hover:bg-[#374B6D] text-white font-bold py-4 px-6 mb-4 rounded-xl shadow-lg transition-all active:scale-95">
                        ¡JUGAR AHORA!
                    </button>

                    <button id="btnShow"
                        class="hidden text-sm w-full bg-[#1e293b] hover:bg-[#374B6D] text-white font-bold py-4 px-6 mb-4 rounded-xl shadow-lg transition-all active:scale-95">
                        Mostrar Respuesta
                    </button>

                    <button id="btnNext"
                        class="hidden text-sm w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 mb-4 rounded-xl shadow-lg transition-all active:scale-95">
                        Siguiente Palabra
                    </button>

                    <div id="evaluationButtons" class="hidden flex gap-4 w-full mb-4">
                        <button id="wrongBtn"
                            class="flex flex-row items-center justify-center bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-2xl flex-1 shadow-md transition-all active:scale-95">
                            <span class="text-xl mx-2">✕</span>
                            <span class="text-xs uppercase tracking-wider">Mal</span>
                        </button>

                        <button id="correctBtn"
                            class="flex flex-row items-center justify-center bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-2xl flex-1 shadow-md transition-all active:scale-95">
                            <span class="text-xl mx-2">✓</span>
                            <span class="text-xs uppercase tracking-wider">Bien</span>
                        </button>
                    </div>

                    <button id="btnReset"
                        class="hidden text-sm w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-6 mb-4 rounded-xl shadow-lg transition-all active:scale-95">
                        Reiniciar el Juego
                    </button>
                </div>

                <div id="containerCheckMode"
                    class="flex justify-end items-center gap-2 mt-4 border-t border-gray-100 pt-4 w-full">
                    <label for="checkMode" class="text-xs font-bold uppercase text-gray-400">Modo Evaluación</label>
                    <input id="checkMode" type="checkbox" class="w-5 h-5 accent-indigo-600 cursor-pointer" checked />
                </div>

                <div id="contenerButtonCategory"
                    class="flex overflow-x-auto flex-nowrap items-center py-5 px-2 gap-2 w-full mt-4">

                    <button id="btnReg" name="regulares" data-category="reg"
                        class="category-btn flex-shrink-0 text-sm bg-[#46608B] text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
                        Regulares
                    </button>

                    <button id="btnIrreg" name="irregulares" data-category="irreg"
                        class="category-btn flex-shrink-0 text-sm bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        Irregulares
                    </button>

                    <button id="btnAmbos" name="ambos" data-category="ambos"
                        class="category-btn flex-shrink-0 text-sm bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        Ambos
                    </button>

                    <button id="btnProfe" name="profesiones" data-category="profe"
                        class="category-btn flex-shrink-0 text-sm bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        Profesiones
                    </button>

                    <button id="btnConect" name="conectivos" data-category="conect"
                        class="category-btn flex-shrink-0 text-sm bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        Conectivos
                    </button>

                    <button id="btnOther" name="other" data-category="other"
                        class="category-btn flex-shrink-0 text-sm bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        Otras palabras
                    </button>
                </div>
            </div>

            <div id="table-contener" class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 flex flex-col">
                <div class="flex items-center justify-center mb-6">
                    <span class="text-2xl mr-2">🧾</span>
                    <h2 class="text-xl font-bold text-gray-800 uppercase tracking-wide">Resultados</h2>
                </div>

                <div class="flex justify-around text-sm font-bold my-5">
                    <span id="contCorrect" class="text-emerald-600">✓ Correctas: 0</span>
                    <span id="contIncorrect" class="text-red-600">✕ Incorrectas: 0</span>
                </div>

                <div class="overflow-y-auto max-h-[400px] rounded-xl border border-gray-200">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 sticky top-0 shadow-sm">
                            <tr>
                                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase">Palabra</th>
                                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase text-center">Estado
                                </th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-sm">
        &copy; 2024 Proyecto de Inglés Interactiva
    </footer>

    <script type="module" src="/js/events.js"></script>
</body>

</html>
