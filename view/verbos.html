<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/normalize.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <header class="bg-white py-6 border-b border-gray-100">
        <h1 class="text-4xl font-extrabold text-center text-indigo-600 tracking-tight uppercase">
            Página de Inglés
        </h1>
    </header>

    <nav class="bg-indigo-700 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-center space-x-8 py-4">
                <a href="/view/index.html"
                    class="text-white hover:text-indigo-200 font-medium transition-colors">Principal</a>
                <a href="/view/verbos.html"
                    class="text-white hover:text-indigo-200 font-medium transition-colors">Verbos</a>
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Preguntas</a>
                <a href="#" class="text-white hover:text-indigo-200 font-medium transition-colors">Futuro</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full p-6 space-y-12">
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div id="contenerButtonCategory" class="flex overflow-x-auto items-center gap-3 py-2 px-1 custom-scrollbar">

                <button id="btnReg" data-category="reg"
                    class="category-btn flex-shrink-0 text-sm bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all hover:bg-indigo-700 active:scale-95">
                    Regulares
                </button>

                <button id="btnIrreg" data-category="irreg"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Irregulares
                </button>

                <button id="btnAmbos" data-category="ambos"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Ambos
                </button>

                <button id="btnProfe" data-category="profe"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Profesiones
                </button>

                <button id="btnConect" data-category="conect"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Conectivos
                </button>

                <button id="btnOther" data-category="other"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Otras palabras
                </button>
            </div>
        </section>

        <section
            class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 transition-all hover:shadow-indigo-100/50">
            <div class="bg-gray-50/50 px-8 py-5 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-black text-gray-700 uppercase tracking-widest">Listado de Verbos</h2>
                <span class="text-xs font-medium text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">Mostrando primeros
                    50</span>
            </div>

            <div class="overflow-x-auto">
                <div class="max-h-[600px] overflow-y-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-indigo-600 uppercase">Presente</th>
                                <th class="px-6 py-4 text-xs font-bold text-indigo-600 uppercase text-center">3ª Persona
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-indigo-600 uppercase">Pasado</th>
                                <th class="px-6 py-4 text-xs font-bold text-indigo-600 uppercase text-center">Gerundio
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-indigo-600 uppercase text-center">Traducción
                                </th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody" class="divide-y divide-gray-50">
                            <tr class="hover:bg-indigo-50/30 transition-colors">
                                <td class="px-6 py-4 text-sm font-medium text-gray-700">Work</td>
                                <td class="px-6 py-4 text-sm text-gray-500 text-center">Works</td>
                                <td class="px-6 py-4 text-sm text-gray-600">Worked</td>
                                <td class="px-6 py-4 text-sm text-gray-500 text-center">Working</td>
                                <td class="px-6 py-4 text-sm font-bold text-blue-600 text-center">Trabajar</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-auto py-8 text-center text-gray-400 text-sm">
        &copy; 2024 Proyecto de Inglés Interactiva • Aprende con estilo
    </footer>

    <script type="module" src="/js/events_index.js"></script>
</body>

</html>
