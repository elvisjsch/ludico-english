<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .mask-fade-edges {
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col text-slate-900">

    <header class="bg-white py-6 border-b border-slate-200 shadow-sm">
        <h1
            class="text-3xl font-extrabold text-center bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 tracking-tight uppercase">
            Página de Inglés
        </h1>
    </header>

    <nav class="bg-indigo-600 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-center space-x-6 py-3">
                <a href="/view/index.html"
                    class="text-indigo-100 hover:text-white text-sm font-semibold transition-all border-b-2 border-transparent hover:border-white pb-1">Principal</a>
                <a href="/view/verbos.html"
                    class="text-indigo-100 hover:text-white text-sm font-semibold transition-all border-b-2 border-transparent hover:border-white pb-1">Verbos</a>
                <a href="#"
                    class="text-indigo-100 hover:text-white text-sm font-semibold transition-all border-b-2 border-transparent hover:border-white pb-1">Preguntas</a>
                <a href="#"
                    class="text-indigo-100 hover:text-white text-sm font-semibold transition-all border-b-2 border-transparent hover:border-white pb-1">Futuro</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full p-6 space-y-12">
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div id="contenerButtonCategory" class="flex overflow-x-auto items-center gap-3 py-2 px-1 custom-scrollbar">

                <button id="btnReg" data-category="reg"
                    class="category-btn flex-shrink-0 text-sm bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl shadow-md">
                    Regulares
                </button>

                <button id="btnIrreg" data-category="irreg"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Irregulares
                </button>

                <button id="btnAmbos" data-category="ambos"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Ambos
                </button>

                <button id="btnProfe" data-category="profe"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Profesiones
                </button>

                <button id="btnConect" data-category="conect"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Conectivos
                </button>

                <button id="btnOther" data-category="other"
                    class="category-btn flex-shrink-0 text-sm bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 font-bold py-3 px-8 rounded-xl shadow-sm transition-all active:scale-95">
                    Otras palabras
                </button>
            </div>
        </section>

        <section
            class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 transition-all hover:shadow-indigo-100/50">
            <div class="bg-gray-50/50 px-8 py-5 border-b border-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-black text-gray-700 uppercase tracking-widest">Listado de Verbos</h2>
                <span class="text-xs font-medium text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">Mostrando primeros
                    50</span>
            </div>

            <div class="overflow-x-auto">
                <div class="max-h-[600px] overflow-y-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th class="px-6 py-4 text-lg font-bold text-indigo-600 uppercase text-start">Presente</th>
                                <th class="px-6 py-4 text-lg font-bold text-indigo-600 uppercase text-center">3ª Persona
                                </th>
                                <th class="px-6 py-4 text-lg font-bold text-indigo-600 uppercase text-center">Pasado</th>
                                <th class="px-6 py-4 text-lg font-bold text-indigo-600 uppercase text-center">Gerundio
                                </th>
                                <th class="px-6 py-4 text-lg font-bold text-indigo-600 uppercase text-center">Traducción
                                </th>
                            </tr>
                        </thead>
                        <tbody id="statsTableBody" class="divide-y divide-gray-50">
                           
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-auto py-8 text-center text-gray-400 text-sm">
        &copy; 2024 Proyecto de Inglés Interactiva • Aprende con estilo
    </footer>

    <script type="module" src="/js/events_verbos.js"></script>
</body>

</html>
