<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inglés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col font-sans text-gray-800">

    <header class="bg-white py-4 border-b border-gray-200 shadow-sm">
        <h1 class="text-2xl md:text-3xl font-extrabold text-center text-indigo-600 tracking-tight uppercase">
            Página de Inglés
        </h1>
    </header>

    <nav class="bg-indigo-700 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex justify-center space-x-6 py-2">
                <a href="/view/index.html" class="text-white text-sm hover:text-indigo-200 font-medium transition-colors">Principal</a>
                <a href="/view/verbos.html" class="text-white text-sm hover:text-indigo-200 font-medium transition-colors">Verbos</a>
                <a href="#" class="text-white text-sm hover:text-indigo-200 font-medium transition-colors">Preguntas</a>
                <a href="#" class="text-white text-sm hover:text-indigo-200 font-medium transition-colors">Futuro</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full max-w-5xl">

            <div id="contener-play" class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 flex flex-col items-center">
                
                <div class="flex items-center gap-4 mb-4">
                    <label class="flex items-center cursor-pointer text-xs font-bold uppercase tracking-wider">
                        <input type="radio" name="opcion" class="sr-only peer" value="es" checked>
                        <div class="px-3 py-1 rounded-lg bg-gray-100 peer-checked:bg-blue-600 peer-checked:text-white transition-all">Español</div>
                    </label>
                    <label class="flex items-center cursor-pointer text-xs font-bold uppercase tracking-wider">
                        <input type="radio" name="opcion" class="sr-only peer" value="en">
                        <div class="px-3 py-1 rounded-lg bg-gray-100 peer-checked:bg-blue-600 peer-checked:text-white transition-all">Inglés</div>
                    </label>
                </div>

                <div class="bg-indigo-50 p-3 rounded-2xl mb-3">
                    <span class="text-2xl">🎮</span>
                </div>

                <h2 class="text-lg font-bold text-gray-700 mb-1">Adivina la palabra</h2>
                
                <div class="min-h-[80px] flex items-center justify-center">
                    <p id="areaText" class="text-2xl font-bold text-indigo-900 italic text-center leading-tight">¿Empezamos?</p>
                </div>

                <div id="areaEnser" class="hidden w-full mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100 text-center">
                    <p id="translation" class="text-xl font-bold text-indigo-600"></p>
                    <p id="pronunciation" class="text-sm text-gray-500 italic"></p>
                </div>

                <div id="contenerButtonPlay" class="w-full max-w-xs mt-6 space-y-3">
                    <button id="btnBegin" class="w-full bg-[#1e293b] hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-xl shadow transition-all active:scale-95 text-sm uppercase">
                        ¡JUGAR AHORA!
                    </button>

                    <button id="btnShow" class="hidden w-full bg-[#1e293b] hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-xl transition-all text-sm uppercase">
                        Mostrar Respuesta
                    </button>

                    <button id="btnNext" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all text-sm uppercase">
                        Siguiente Palabra
                    </button>

                    <div id="evaluationButtons" class="hidden flex gap-3 w-full">
                        <button id="wrongBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl flex-1 transition-all active:scale-95 text-sm flex items-center justify-center gap-2">
                            <span>✕</span> MAL
                        </button>
                        <button id="correctBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl flex-1 transition-all active:scale-95 text-sm flex items-center justify-center gap-2">
                            <span>✓</span> BIEN
                        </button>
                    </div>

                    <button id="btnReset" class="hidden w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-xl transition-all text-sm uppercase">
                        Reiniciar
                    </button>
                </div>

                <div class="w-full mt-6 pt-4 border-t border-gray-50">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Modo Evaluación</span>
                        <input id="checkMode" type="checkbox" class="w-4 h-4 accent-indigo-600 cursor-pointer" checked />
                    </div>

                    <div id="contenerButtonCategory" class="flex overflow-x-auto custom-scroll gap-2 pb-2">
                        <button data-category="reg" class="category-btn flex-shrink-0 text-[11px] bg-[#46608B] text-white font-bold py-2 px-4 rounded-lg shadow-sm">Regulares</button>
                        <button data-category="irreg" class="category-btn flex-shrink-0 text-[11px] bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-2 px-4 rounded-lg">Irregulares</button>
                        <button data-category="ambos" class="category-btn flex-shrink-0 text-[11px] bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-2 px-4 rounded-lg">Ambos</button>
                        <button data-category="conect" class="category-btn flex-shrink-0 text-[11px] bg-gray-200 text-gray-600 hover:bg-gray-300 font-bold py-2 px-4 rounded-lg">Conectivos</button>
                    </div>
                </div>
            </div>

            <div id="table-contener" class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100 flex flex-col h-full max-h-[600px]">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-bold text-gray-800 uppercase tracking-widest flex items-center gap-2">
                        <span class="text-lg">🧾</span> Resultados
                    </h2>
                    <div class="flex gap-4 text-[11px] font-bold">
                        <span id="contCorrect" class="text-emerald-600">✓ 0</span>
                        <span id="contIncorrect" class="text-red-600">✕ 0</span>
                    </div>
                </div>

                <div class="overflow-hidden rounded-xl border border-gray-100 flex-grow flex flex-col">
                    <div class="overflow-y-auto custom-scroll">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-2 text-[10px] font-bold text-gray-500 uppercase">Palabra</th>
                                    <th class="px-4 py-2 text-[10px] font-bold text-gray-500 uppercase text-center">Estado</th>
                                </tr>
                            </thead>
                            <tbody id="statsTableBody" class="divide-y divide-gray-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-4 text-center text-gray-400 text-[10px] uppercase tracking-widest">
        &copy; 2026 Proyecto de Inglés
    </footer>

    <script type="module" src="/js/events_index.js"></script>
</body>

</html>
